apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rfgo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/rfgo-deploy.git # Change this later
    targetRevision: HEAD
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: rfgo-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
