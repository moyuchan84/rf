name: Build and Deploy (FastAPI)

on:
  push:
    branches: [ main ]
    paths:
      - 'rfgo-vsto-fastapi/**'

jobs:
  build:
    runs-on: k8s-arc-runner 

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: kubernetes

    - name: Login to Harbor
      uses: docker/login-action@v3
      with:
        registry: harbor.internal
        username: ${{ secrets.HARBOR_USERNAME }}
        password: ${{ secrets.HARBOR_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ./rfgo-vsto-fastapi
        push: true
        tags: harbor.internal/rfgo/rfgo-vsto-fastapi:${{ github.sha }}
        build-args: |
          PIP_INDEX_URL=${{ secrets.INTERNAL_PYPI_MIRROR }}
          PIP_TRUSTED_HOST=${{ secrets.INTERNAL_PYPI_TRUSTED_HOST }}

    - name: Update Kustomize Image
      run: |
        cd rfgo-deploy/k8s/overlays/dev
        sed -i "/name: harbor.internal\/rfgo\/rfgo-vsto-fastapi/{n;s/newTag: .*/newTag: ${{ github.sha }}/}" kustomization.yaml
        
    - name: Commit and Push Manifest Change
      run: |
        git config --global user.name "GHA Runner"
        git config --global user.email "gha@internal"
        git add rfgo-deploy/k8s/overlays/dev/kustomization.yaml
        git commit -m "chore(deploy): update fastapi image to ${{ github.sha }}"
        git push origin main
