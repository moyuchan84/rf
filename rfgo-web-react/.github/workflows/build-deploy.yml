name: Build and Deploy (React)

on:
  push:
    branches: [ main ]
    
    paths:
      - 'rfgo-web-react/**'

jobs:
  build:
    # Use your internal ARC runner label
    runs-on: k8s-arc-runner 

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        # In closed network, you might need to point to internal builder or config
        driver: kubernetes

    - name: Login to Harbor
      uses: docker/login-action@v3
      with:
        registry: harbor.internal
        username: ${{ secrets.HARBOR_USERNAME }}
        password: ${{ secrets.HARBOR_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ./rfgo-web-react
        push: true
        tags: harbor.internal/rfgo/rfgo-web-react:${{ github.sha }}
        build-args: |
          NPM_REGISTRY=${{ secrets.INTERNAL_NPM_REGISTRY }}

    - name: Update Kustomize Image
      run: |
        # Update the image tag in the deploy repo (assuming mono-repo for now)
        cd rfgo-deploy/k8s/overlays/dev
        sed -i "s|newTag: .*|newTag: ${{ github.sha }}|g" kustomization.yaml
        
    - name: Commit and Push Manifest Change
      run: |
        git config --global user.name "GHA Runner"
        git config --global user.email "gha@internal"
        git add rfgo-deploy/k8s/overlays/dev/kustomization.yaml
        git commit -m "chore(deploy): update react image to ${{ github.sha }}"
        git push origin main
