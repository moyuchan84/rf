<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoKey Manager - Active Workbook Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { background-color: #f1f5f9; font-family: 'Malgun Gothic', 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        [v-cloak] { display: none; }
        
        .spinner { animation: rotate 2s linear infinite; width: 50px; height: 50px; }
        .spinner .path { stroke: #2563eb; stroke-linecap: round; animation: dash 1.5s ease-in-out infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes dash {
            0% { stroke-dasharray: 1, 150; stroke-dashoffset: 0; }
            50% { stroke-dasharray: 90, 150; stroke-dashoffset: -35; }
            100% { stroke-dasharray: 90, 150; stroke-dashoffset: -124; }
        }
    </style>
</head>
<body class="p-3 text-slate-800">
    <div id="app" v-cloak class="relative h-screen flex flex-col overflow-hidden">
        <!-- Loading Overlay -->
        <div v-if="status === 'PARSING'" 
             class="fixed inset-0 z-[500] flex flex-col items-center justify-center bg-white/60 backdrop-blur-md">
            <svg class="spinner" viewBox="0 0 50 50">
                <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
            </svg>
            <p class="mt-4 text-blue-600 font-black text-xs uppercase tracking-[0.2em] animate-pulse">PARSING ACTIVE WORKBOOK...</p>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar pb-20">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-blue-600">bolt</span>
                    <h1 class="text-xl font-black text-slate-900 tracking-tight">Active Upload</h1>
                </div>
            </div>

            <!-- Hierarchy Info (Same as WorkSheetsLoader) -->
            <div class="glass p-4 rounded-2xl shadow-sm border border-slate-200 mb-4">
                <div class="flex justify-between items-center mb-3">
                    <div class="flex items-center gap-2">
                        <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Hierarchy Information</h2>
                    </div>
                    <div class="flex bg-slate-100 p-0.5 rounded-lg">
                        <button @click="selectionMode = 'new'" 
                                class="px-3 py-1 rounded text-[9px] font-black transition-all"
                                :class="selectionMode === 'new' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'">MANUAL</button>
                        <button @click="selectionMode = 'db'; loadDbHierarchy()" 
                                class="px-3 py-1 rounded text-[9px] font-black transition-all flex items-center gap-1"
                                :class="selectionMode === 'db' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'">
                            <span class="material-symbols-outlined text-[10px]">database</span> DB
                        </button>
                    </div>
                </div>

                <div v-if="selectionMode === 'db'" class="mb-4">
                    <div class="flex items-center gap-2 mb-2 overflow-x-auto pb-1 no-scrollbar text-[10px] font-bold">
                        <button @click="dbSelection.selectedPP = null; dbSelection.selectedBG = null" :class="!dbSelection.selectedPP ? 'text-blue-600' : 'text-slate-400'">1. Plan</button>
                        <span class="text-slate-300">/</span>
                        <button @click="dbSelection.selectedBG = null" :class="dbSelection.selectedPP && !dbSelection.selectedBG ? 'text-blue-600' : 'text-slate-400'">2. Group</button>
                        <span class="text-slate-300">/</span>
                        <button v-if="dbSelection.selectedBG" class="text-slate-400">3. Product</button>
                    </div>
                    <div class="max-h-40 overflow-y-auto border border-slate-100 rounded-xl bg-slate-50/50 p-2 custom-scrollbar">
                        <div v-if="!dbSelection.selectedPP" class="grid grid-cols-2 gap-2">
                            <button v-for="pp in dbHierarchy" :key="pp.id" @click="selectPP(pp)" class="text-left px-2 py-1.5 bg-white border border-slate-200 rounded-lg text-[10px] font-bold">{{pp.design_rule}}</button>
                        </div>
                        <div v-else-if="!dbSelection.selectedBG" class="grid grid-cols-2 gap-2">
                            <button v-for="bg in dbSelection.selectedPP.beol_groups" :key="bg.id" @click="selectBG(bg)" class="text-left px-2 py-1.5 bg-white border border-slate-200 rounded-lg text-[10px] font-bold">{{bg.group_name}}</button>
                        </div>
                        <div v-else class="grid grid-cols-2 gap-2">
                            <button v-for="prod in dbSelection.selectedBG.products" :key="prod.id" @click="selectFromDb(prod, dbSelection.selectedBG, dbSelection.selectedPP)" class="text-left px-2 py-1.5 bg-white border border-slate-200 rounded-lg text-[10px] font-bold">{{prod.partid}}</button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2 border-t border-slate-100">
                    <input v-model="hierarchy.processPlan" type="text" placeholder="Design Rule" class="text-xs px-3 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    <input v-model="hierarchy.beolOption" type="text" placeholder="Option Name" class="text-xs px-3 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    <input v-model="hierarchy.partId" type="text" placeholder="Part ID" class="text-xs px-3 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    <input v-model="hierarchy.productName" type="text" placeholder="Product Name" class="text-xs px-3 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <!-- Active Workbook Info -->
            <div class="glass p-6 rounded-3xl border border-blue-100 bg-blue-50/30 text-center">
                <span class="material-symbols-outlined text-blue-400 text-4xl mb-2">description</span>
                <h3 class="text-sm font-black text-slate-700 uppercase tracking-widest">Active Workbook Detected</h3>
                <p class="text-[10px] text-slate-400 font-bold mt-1 uppercase italic">Excel interop will capture the currently open file</p>
            </div>
        </div>

        <!-- Fixed Bottom Action Bar -->
        <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-slate-200">
            <button @click="parseAndPreview" 
                    :disabled="status === 'PARSING'"
                    class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-400 text-white py-4 rounded-2xl font-black text-sm tracking-[0.2em] shadow-xl transition-all active:scale-[0.98] flex items-center justify-center gap-2 uppercase">
                <span class="material-symbols-outlined text-sm">science</span>
                GENERATE PREVIEW
            </button>
        </div>
    </div>

    <script src="../WorkSheetsLoader/api.js"></script>
    <script src="app.js"></script>
</body>
</html>
