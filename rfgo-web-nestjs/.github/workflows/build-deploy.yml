name: Build and Deploy (NestJS)

on:
  push:
    branches: [ main ]
    paths:
      - 'rfgo-web-nestjs/**'

jobs:
  build:
    runs-on: k8s-arc-runner 

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: kubernetes

    - name: Login to Harbor
      uses: docker/login-action@v3
      with:
        registry: harbor.internal
        username: ${{ secrets.HARBOR_USERNAME }}
        password: ${{ secrets.HARBOR_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ./rfgo-web-nestjs
        push: true
        tags: harbor.internal/rfgo/rfgo-web-nestjs:${{ github.sha }}

    - name: Update Kustomize Image
      run: |
        cd rfgo-deploy/k8s/overlays/dev
        sed -i "s|harbor.internal/rfgo/rfgo-web-nestjs|harbor.internal/rfgo/rfgo-web-nestjs|g" kustomization.yaml
        # Use a more specific sed to target the correct tag
        # This is a simplified version; in a real scenario, use yq or more precise sed
        sed -i "/name: harbor.internal\/rfgo\/rfgo-web-nestjs/{n;s/newTag: .*/newTag: ${{ github.sha }}/}" kustomization.yaml
        
    - name: Commit and Push Manifest Change
      run: |
        git config --global user.name "GHA Runner"
        git config --global user.email "gha@internal"
        git add rfgo-deploy/k8s/overlays/dev/kustomization.yaml
        git commit -m "chore(deploy): update nestjs image to ${{ github.sha }}"
        git push origin main
